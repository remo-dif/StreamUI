<div class="chat-input-container">
  <div class="attachment-chips" *ngIf="attachments().length">
    <span class="attachment-chip" *ngFor="let file of attachments()">
      {{ file.name }}
      <button type="button" class="remove-file" (click)="removeAttachment(file)">✕</button>
    </span>
  </div>

  <div class="input-wrapper">
    <textarea
      #messageInput
      [(ngModel)]="messageText"
      [placeholder]="placeholder"
      [disabled]="disabled || isStreaming"
      (keydown)="onKeyDown($event)"
      (input)="autoResize()"
      rows="1"
      class="message-input"
    ></textarea>

    <button type="button" class="attach-button" (click)="onAttachClick()" [disabled]="disabled || isStreaming" title="Attach file">
      📎
    </button>
    <input #fileInput type="file" accept="image/*,.pdf" multiple hidden (change)="onFilesSelected($event)" />
    
    <button
      type="button"
      class="send-button"
      *ngIf="!isStreaming"
      [disabled]="disabled || (!messageText.trim() && attachments().length === 0)"
      (click)="sendMessage()"
      [title]="disabled ? 'Please wait...' : 'Send message (Enter)'"
    >
      @if (disabled) {
        <svg class="spinner" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" opacity="0.25"/>
          <path d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z" fill="currentColor"/>
        </svg>
      } @else {
        <svg class="send-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
        </svg>
      }
    </button>

    <button
      type="button"
      class="stop-button"
      *ngIf="isStreaming"
      [disabled]="disabled"
      (click)="stopStreaming.emit()"
      title="Stop generating"
    >
      Stop
    </button>
  </div>
  
  <div class="input-hint">
    <span class="hint-text">Press Enter to send, Shift+Enter for new line</span>
    @if (characterCount > 0) {
      <span class="character-count" [class.warning]="characterCount > 30000">
        {{ characterCount }} / 32,000 characters
      </span>
    }
  </div>
</div>
